<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llmfit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>LLMFit</h1>
    <button id="lang-toggle" class="lang-toggle">中文</button>
  </header>

  <section id="system-panel">
    <h2 data-i18n="system">System</h2>
    <div id="specs-grid" class="specs-grid">
      <div class="spec-card">
        <span class="spec-label" data-i18n="cpu">CPU</span>
        <span id="cpu-name" class="spec-value" data-i18n="detecting">Detecting...</span>
        <span id="cpu-cores" class="spec-detail"></span>
      </div>
      <div class="spec-card">
        <span class="spec-label" data-i18n="total_ram">Total RAM</span>
        <span id="ram-total" class="spec-value">—</span>
      </div>
      <div class="spec-card">
        <span class="spec-label" data-i18n="available_ram">Available RAM</span>
        <span id="ram-available" class="spec-value">—</span>
      </div>
      <div id="gpus-container">
        <!-- GPU cards injected by JS -->
      </div>
      <div class="spec-card" id="memory-arch-card" style="display:none">
        <span class="spec-label" data-i18n="memory">Memory</span>
        <span id="memory-arch" class="spec-value">—</span>
      </div>
    </div>
  </section>

  <section id="models-panel">
    <h2 data-i18n="model_compatibility">Model Compatibility</h2>
    <div class="controls">
      <input type="text" id="search" data-i18n-placeholder="filter_models" placeholder="Filter models..." />
      <select id="fit-filter">
        <option value="all" data-i18n="all_fit_levels">All Fit Levels</option>
        <option value="Perfect" data-i18n="perfect">Perfect</option>
        <option value="Good" data-i18n="good">Good</option>
        <option value="Marginal" data-i18n="marginal">Marginal</option>
        <option value="Too Tight" data-i18n="too_tight">Too Tight</option>
      </select>
    </div>
    <div id="models-table-container">
      <table id="models-table">
        <thead>
          <tr>
            <th data-i18n="model">Model</th>
            <th data-i18n="params">Params</th>
            <th data-i18n="quant">Quant</th>
            <th data-i18n="fit">Fit</th>
            <th data-i18n="mode">Mode</th>
            <th data-i18n="score">Score</th>
            <th data-i18n="ram_req">RAM Req</th>
            <th data-i18n="est_tps">Est. TPS</th>
            <th data-i18n="use_case">Use Case</th>
          </tr>
        </thead>
        <tbody id="models-body">
          <tr><td colspan="9" class="loading" data-i18n="loading_models">Loading models...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <div id="model-modal" class="modal-overlay">
    <div class="modal-content" id="modal-body"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
